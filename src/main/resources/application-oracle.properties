# =================================================================
# PERFIL ORACLE - Activar con: --spring.profiles.active=oracle
# Para produccion con Oracle Database
# =================================================================

spring.datasource.url=${DATABASE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DATABASE_USERNAME:NEXOERP}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update

# HikariCP produccion
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000

spring.h2.console.enabled=false
