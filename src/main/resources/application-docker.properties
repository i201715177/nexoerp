spring.application.name=nexoerp

# Base de datos: configurar via variables de entorno o usar H2 en archivo por defecto
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/nexoerp;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Logs
logging.file.name=logs/nexoerp.log
logging.level.root=INFO
logging.level.com.farmacia.sistema=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.export.prometheus.enabled=true
