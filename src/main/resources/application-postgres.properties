# =================================================================
# PERFIL POSTGRESQL - Activar con: --spring.profiles.active=postgres
# Para produccion SaaS con multiples empresas
# =================================================================

# --- Datasource (sobreescribible por variables de entorno en Render) ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/nexoerp}
spring.datasource.username=${DATABASE_USERNAME:nexoerp_user}
spring.datasource.password=${DATABASE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=128
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- HikariCP (pool de conexiones optimizado para plan gratuito/Standard) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.pool-name=NexoERP-Pool

# Desactivar consola H2 en perfil postgres
spring.h2.console.enabled=false

# --- Compresion HTTP (respuestas mas ligeras, menos ancho de banda) ---
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# --- Sesion y seguridad ---
server.servlet.session.timeout=30m

# --- Logs produccion (limpios, sin debug de mail ni SQL) ---
spring.mail.properties.mail.debug=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.boot.autoconfigure=WARN
