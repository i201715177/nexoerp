## Perfil PostgreSQL para entorno de pruebas / producción
## NO afecta al perfil por defecto (H2) mientras no se active.
##
## Para usarlo:
## 1) Levanta PostgreSQL (por ejemplo en localhost:5432) y crea la BD:
##      - Base: nexoerp
##      - Usuario: nexoerp_user
## 2) Arranca la app con:
##      -Dspring.profiles.active=postgres
##
## En desarrollo, H2 sigue siendo el default (ver application.properties).

spring.datasource.url=jdbc:postgresql://localhost:5432/nexoerp
spring.datasource.username=nexoerp_user
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Para primera prueba de esquema:
#   create   → borra y crea tablas en cada arranque (solo pruebas)
#   update   → actualiza esquema sin borrar datos (recomendado tras la primera creación)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Ajustes Hikari genéricos (se pueden afinar luego)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# =================================================================
# PERFIL POSTGRESQL - Activar con: --spring.profiles.active=postgres
# Para produccion SaaS con multiples empresas
# =================================================================

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/nexoerp}
spring.datasource.username=${DATABASE_USERNAME:nexoerp_user}
spring.datasource.password=${DATABASE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# HikariCP produccion
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000

spring.h2.console.enabled=false
