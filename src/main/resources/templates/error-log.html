<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error - NexoERP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { width: 100%; max-width: 720px; padding: 1.5rem; }
        pre.stack-trace { font-size: 12px; max-height: 360px; overflow: auto; background: var(--bg-main, #f0f2f5); padding: 1rem; border-radius: .5rem; margin: 0; }
    </style>
</head>
<body>
<div class="error-container">
    <div class="content-card">
        <div class="content-card-header" style="border-left: 4px solid var(--danger, #e74c3c);">
            <h3><i class="bi bi-exclamation-octagon me-2"></i>Error en la aplicaci&oacute;n</h3>
        </div>
        <div class="content-card-body">
            <p class="text-muted mb-4">Se ha registrado el error en el log del servidor. A continuaci&oacute;n el detalle.</p>

            <div class="mb-3">
                <div class="form-label fw-semibold"><i class="bi bi-tag me-1"></i>Tipo</div>
                <div class="form-control-plaintext" th:text="${tipo}">-</div>
            </div>
            <div class="mb-3">
                <div class="form-label fw-semibold"><i class="bi bi-chat-left-text me-1"></i>Mensaje</div>
                <div class="form-control-plaintext" th:text="${mensaje}">-</div>
            </div>
            <div class="mb-3">
                <div class="form-label fw-semibold"><i class="bi bi-link-45deg me-1"></i>URL</div>
                <div class="form-control-plaintext" th:text="${url}">-</div>
            </div>
            <div class="mb-3">
                <div class="form-label fw-semibold"><i class="bi bi-code-square me-1"></i>Stack trace</div>
                <pre class="stack-trace" th:text="${stackTrace}">-</pre>
            </div>

            <div class="d-flex gap-2 mt-4">
                <a th:href="@{/}" class="btn btn-primary"><i class="bi bi-house me-1"></i> Volver al inicio</a>
                <a th:href="@{/web/ventas}" class="btn btn-outline-secondary"><i class="bi bi-receipt me-1"></i> Ir a Ventas</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
