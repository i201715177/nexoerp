<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error - NexoERP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; min-height: 100vh; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .box { max-width: 420px; text-align: center; }
        .icon { font-size: 3rem; color: #64748b; margin-bottom: 1rem; }
        h1 { font-size: 1.25rem; color: #334155; margin-bottom: 0.5rem; }
        p { color: #64748b; font-size: 0.95rem; margin-bottom: 1.5rem; }
        a { color: #6366f1; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="box">
    <div class="icon"><i class="bi bi-exclamation-triangle"></i></div>
    <h1>Ha ocurrido un error</h1>
    <p>Algo falló en el servidor. Por favor intente de nuevo en unos instantes.</p>
    <p><a th:href="@{/solicitar-suscripcion}">Ir a Solicitar suscripción</a> &middot; <a th:href="@{/login}">Iniciar sesión</a></p>
</div>
</body>
</html>
