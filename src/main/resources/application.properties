spring.application.name=nexoerp
spring.main.allow-bean-definition-overriding=true

# Forzamos puerto fijo para evitar conflicto con PORT
server.port=8082
server.address=0.0.0.0

# =================================================================
# Base de datos por defecto: H2 en archivo (solo desarrollo local)
# Produccion: --spring.profiles.active=postgres  o  oracle
# =================================================================
# Base de datos H2 en memoria para desarrollo (evita problemas de archivo bloqueado).
# En producción se usa el perfil postgres u oracle.
spring.datasource.url=jdbc:h2:mem:nexoerp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Forzamos el dialecto H2 para que no dependa de metadata JDBC.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# Zona horaria
spring.jackson.time-zone=America/Lima

# Encoding
spring.thymeleaf.encoding=UTF-8
spring.web.encoding.charset=UTF-8
spring.web.encoding.force=true

# Logs
logging.file.name=logs/nexoerp.log
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.farmacia.sistema=INFO
logging.level.org.springframework.security=WARN

# JWT - En produccion sobreescribir con variable de entorno APP_SECURITY_JWT_SECRET
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:ZmFybWFjaWEtc2lzdGVtYS1zZWNyZXRvLWxhcmdvLWxhcmdvLWxhcmdvLWxhcmdv}
app.security.jwt.expiration-ms=${APP_SECURITY_JWT_EXPIRATION:3600000}

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.metrics.export.prometheus.enabled=true
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.web.servlet.ServletManagementContextAutoConfiguration

# Subida de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Perfil por defecto
spring.profiles.default=dev

