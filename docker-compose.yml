version: "3.9"

services:
  app:
    build: .
    container_name: nexoerp-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m -Xms256m -XX:+UseG1GC
      - APP_SECURITY_JWT_SECRET=${APP_SECURITY_JWT_SECRET:-ZmFybWFjaWEtc2lzdGVtYS1zZWNyZXRvLWxhcmdvLWxhcmdvLWxhcmdvLWxhcmdv}
    depends_on:
      - redis
    volumes:
      - nexoerp-logs:/app/logs
      - nexoerp-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: nexoerp-redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nexoerp-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: nexoerp-prometheus
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: nexoerp-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  nexoerp-logs:
  nexoerp-data:

